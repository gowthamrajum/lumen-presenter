name: Release

# Cut a release by pushing a tag: `git tag v0.2.0 && git push origin v0.2.0`
# (or run manually from the Actions tab). Builds run on GitHub's own macOS and
# Windows runners — $0 for public repos, and Windows gets a real NSIS installer
# with no Wine needed. electron-builder uploads the artifacts to a GitHub Release
# (draft by default; publish it with one click). GitHub Releases doubles as the
# free auto-update feed (electron-updater).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # create/upload the GitHub Release

jobs:
  release:
    strategy:
      fail-fast: false
      # Serialize the platform builds. Both run `electron-builder --publish always`,
      # which finds-or-creates the tag's draft release; running them concurrently
      # races and creates TWO drafts, splitting the mac + win assets across them.
      # With max-parallel: 1 the first runner creates the draft and the second
      # reuses it, so one release carries every asset. (Costs ~one extra build's
      # wall-clock; releases are infrequent, so that's fine.)
      max-parallel: 1
      matrix:
        include:
          - os: macos-latest
            target: '--mac' # dmg x64 + arm64 (unsigned — see RELEASING.md)
          - os: windows-latest
            target: '--win' # NSIS installer, native (no Wine)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple cert in a $0 setup — build unsigned instead of failing on a
          # missing identity. (Windows signing is opt-in via SignPath, see docs.)
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          npm run build
          npx electron-builder ${{ matrix.target }} --publish always

  # Write the install instructions into the release once both builds are done.
  notes:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --notes-file .github/RELEASE_NOTES.md

  # Bump the Homebrew cask in gowthamrajum/homebrew-lumen. Skipped until a tap
  # credential is present — preferred is HOMEBREW_TAP_DEPLOY_KEY (an SSH deploy
  # key scoped to just the tap repo, no PAT to manage); HOMEBREW_TAP_TOKEN (a PAT
  # with write to the tap) also works. See RELEASING.md. Until then, bump by hand:
  # scripts/bump-cask.sh vX.Y.Z
  homebrew:
    needs: release
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      # Preferred path: an SSH deploy key scoped to the tap repo alone.
      - name: Configure tap deploy key
        if: ${{ env.HOMEBREW_TAP_DEPLOY_KEY != '' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$HOMEBREW_TAP_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          echo "HOMEBREW_TAP_SSH=1" >> "$GITHUB_ENV"

      - name: Bump the Homebrew cask
        if: ${{ env.HOMEBREW_TAP_DEPLOY_KEY != '' || env.HOMEBREW_TAP_TOKEN != '' }}
        run: bash scripts/bump-cask.sh "${{ github.ref_name }}"

  # Sign the Windows installer with SignPath's free OSS plan, then replace the
  # release's .exe + auto-update feed with the signed one. Pure no-op until you
  # add the SIGNPATH_API_TOKEN secret + SIGNPATH_* variables — see SIGNING.md.
  # (The unsigned .exe published by `release` above stays valid meanwhile.)
  sign-windows:
    needs: release
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: ${{ env.SIGNPATH_API_TOKEN != '' }}
        with:
          node-version: 20
          cache: npm

      - name: Build unsigned installer
        if: ${{ env.SIGNPATH_API_TOKEN != '' }}
        run: |
          npm ci
          npm run build
          npx electron-builder --win --publish never

      - uses: actions/upload-artifact@v4
        id: unsigned
        if: ${{ env.SIGNPATH_API_TOKEN != '' }}
        with:
          name: lumen-unsigned-win
          path: release/*.exe

      - name: Sign with SignPath (free OSS)
        if: ${{ env.SIGNPATH_API_TOKEN != '' }}
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          github-artifact-id: ${{ steps.unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: release

      - name: Repatch auto-update metadata for the signed installer
        if: ${{ env.SIGNPATH_API_TOKEN != '' }}
        shell: bash
        run: node scripts/repatch-latest-yml.mjs "$(ls release/*.exe | head -1)" release/latest.yml

      - name: Replace the release's Windows asset with the signed one
        if: ${{ env.SIGNPATH_API_TOKEN != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" release/*.exe release/latest.yml --clobber --repo "${{ github.repository }}"
