<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lumen — Broadcast Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anek+Telugu:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* tweakable via query string, e.g. ?size=6&pos=bottom&pad=8 */
    --size: 5.2vh;
    --text: #ffffff;
    --accent: #ffd27f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;          /* OBS composites over your video */
    overflow: hidden;
    font-family: 'Anek Telugu', 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #stage {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    padding: 4vh 6vw;
    opacity: 0; transition: opacity .18s ease;
  }
  #stage.show { opacity: 1; }
  #stage.pos-bottom { justify-content: flex-end; align-items: center; }
  #stage.pos-center { justify-content: center; align-items: center; }
  #stage.pos-top    { justify-content: flex-start; align-items: center; }
  /* A soft scrim so the text is readable over any footage — and visible even
     when the page is opened in a plain (white) browser tab, not just OBS. */
  .scrim {
    position: fixed; left: 0; right: 0; bottom: 0; height: 46vh;
    background: linear-gradient(to top, rgba(0,0,0,.62), rgba(0,0,0,0));
    pointer-events: none;
  }
  #stage.pos-center .scrim { top: 0; height: 100vh; background: linear-gradient(to top, rgba(0,0,0,.5), rgba(0,0,0,.28), rgba(0,0,0,.5)); }
  #stage.pos-top .scrim { top: 0; bottom: auto; background: linear-gradient(to bottom, rgba(0,0,0,.62), rgba(0,0,0,0)); }
  #stage.clean .scrim { display: none; }
  .lyrics {
    text-align: center;
    color: var(--text);
    font-weight: 700;
    font-size: var(--size);
    line-height: 1.22;
    max-width: 92vw;
    text-wrap: balance;
    /* heavy outline + shadow so it survives over any footage */
    text-shadow:
      0 2px 2px rgba(0,0,0,.65),
      0 0 6px rgba(0,0,0,.55),
      2px 0 0 rgba(0,0,0,.4), -2px 0 0 rgba(0,0,0,.4),
      0 2px 0 rgba(0,0,0,.4), 0 -2px 0 rgba(0,0,0,.4);
  }
  .lyrics .line { display: block; }
  .caption {
    margin-top: 1.4vh;
    text-align: center;
    color: var(--accent);
    font-weight: 500;
    font-size: calc(var(--size) * 0.42);
    text-shadow: 0 2px 4px rgba(0,0,0,.7);
  }
</style>
</head>
<body>
  <div id="stage"><div class="scrim"></div><div class="lyrics" id="lyrics"></div><div class="caption" id="caption"></div></div>
<script>
(function () {
  var q = new URLSearchParams(location.search);
  var m = location.pathname.match(/\/broadcast\/([^/]+)\/view/);
  var room = q.get('room') || (m && m[1]) || 'main';
  var base = (q.get('base') || (location.protocol.indexOf('http') === 0 ? location.origin : '')).replace(/\/$/, '');
  var token = q.get('token') || '';
  var pos = q.get('pos') || 'bottom';       // bottom | center | top
  if (q.get('size')) document.documentElement.style.setProperty('--size', q.get('size') + 'vh');

  var stage = document.getElementById('stage');
  var lyricsEl = document.getElementById('lyrics');
  var captionEl = document.getElementById('caption');
  stage.classList.add('pos-' + pos);
  if (q.get('clean') === '1') stage.classList.add('clean'); // no scrim (pure alpha)

  function textOf(slide) {
    if (!slide) return [];
    if (slide.composed && slide.composed.length) return slide.composed.map(function (l) { return l.text; });
    return slide.lines || [];
  }

  function render(state) {
    var slide = state && state.slide;
    var hidden = !state || state.blackout || state.clearText || !slide;
    var lines = hidden ? [] : textOf(slide).filter(function (t) { return t && t.trim(); });
    if (!lines.length) { stage.classList.remove('show'); return; }
    lyricsEl.innerHTML = '';
    lines.forEach(function (t) {
      var d = document.createElement('span'); d.className = 'line'; d.textContent = t; lyricsEl.appendChild(d);
    });
    var cap = (!hidden && slide && slide.caption) ? slide.caption : '';
    captionEl.textContent = cap;
    captionEl.style.display = cap ? '' : 'none';
    stage.classList.add('show');
  }

  function apply(msg) { if (msg && typeof msg === 'object' && 'state' in msg) render(msg.state); }

  // Primary: Server-Sent Events (instant). Fallback: short-poll.
  var qs = token ? ('?token=' + encodeURIComponent(token)) : '';
  var pollTimer = null, lastRev = -1, es = null;

  function startPolling() {
    if (pollTimer) return;
    pollTimer = setInterval(function () {
      fetch(base + '/broadcast/' + encodeURIComponent(room) + '/state' + qs, { cache: 'no-store' })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (d) { if (d && d.rev !== lastRev) { lastRev = d.rev; render(d.state); } })
        .catch(function () {});
    }, 700);
  }

  function startSSE() {
    try {
      es = new EventSource(base + '/broadcast/' + encodeURIComponent(room) + '/stream' + qs);
      es.addEventListener('state', function (e) { try { apply(JSON.parse(e.data)); } catch (_) {} });
      es.onerror = function () {
        // EventSource auto-reconnects; if it never opens, polling covers us.
        startPolling();
      };
    } catch (_) {
      startPolling();
    }
  }

  if (window.EventSource) startSSE(); else startPolling();
})();
</script>
</body>
</html>
