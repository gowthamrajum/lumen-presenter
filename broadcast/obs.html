<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Lumen — Broadcast</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anek+Telugu:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --size: 5.2cqh;         /* OBS lower-third base size (audience computes its own) */
    --text: #ffffff;
    --accent: #ffd27f;
    --scrim: 0;             /* audience: theme dark scrim over the background */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;            /* OBS composites over your video */
    font-family: 'Anek Telugu', 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* The frame is the layout box + the sizing container for cqh/cqw units.
     OBS: full viewport (transparent). Audience: a centred 16:9 letterbox so it
     looks right in any orientation — like a video player — with black bars. */
  .frame { position: fixed; inset: 0; overflow: hidden; container-type: size; }
  html.mode-audience { background: #000; }
  html.mode-audience .frame {
    inset: auto;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: min(100vw, calc(100vh * 16 / 9));
    height: min(100vh, calc(100vw * 9 / 16));
  }

  /* ---- shared layers (positioned within the frame) ---- */
  #bg { position: absolute; inset: 0; display: none; background: #0a0720; }
  #bgimg, #bgvideo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
  #scrim { position: absolute; inset: 0; pointer-events: none; }
  #stage {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    padding: 4% 6%;
    opacity: 0; transition: opacity .18s ease;
  }
  #stage.show { opacity: 1; }

  .lyrics { text-align: center; color: var(--text); font-weight: 700; font-size: var(--size); line-height: 1.22; max-width: 92%; text-wrap: balance; }
  .lyrics .line { display: block; }
  .lyrics.upper { text-transform: uppercase; }
  .caption { margin-top: 1.4cqh; text-align: center; color: var(--accent); font-weight: 500; font-size: calc(var(--size) * 0.42); text-shadow: 0 2px 4px rgba(0,0,0,.7); }

  #composed { position: absolute; inset: 0; display: none; }
  #composed .cline { position: absolute; transform: translate(-50%, -50%); text-align: center; white-space: pre-wrap; font-weight: 700; }

  /* ============ OBS mode: transparent alpha, lyrics lower-third ============ */
  html.mode-obs #stage { justify-content: flex-end; align-items: center; }
  html.mode-obs.pos-center #stage { justify-content: center; }
  html.mode-obs.pos-top #stage { justify-content: flex-start; }
  html.mode-obs #scrim { background: linear-gradient(to top, rgba(0,0,0,.62), rgba(0,0,0,0) 46%); }
  html.mode-obs.pos-top #scrim { background: linear-gradient(to bottom, rgba(0,0,0,.62), rgba(0,0,0,0) 46%); }
  html.mode-obs.pos-center #scrim { background: linear-gradient(rgba(0,0,0,.5), rgba(0,0,0,.28), rgba(0,0,0,.5)); }
  html.mode-obs.clean #scrim { display: none; }
  html.mode-obs .lyrics, html.mode-obs .caption {
    text-shadow:
      0 2px 2px rgba(0,0,0,.65), 0 0 6px rgba(0,0,0,.55),
      2px 0 0 rgba(0,0,0,.4), -2px 0 0 rgba(0,0,0,.4),
      0 2px 0 rgba(0,0,0,.4), 0 -2px 0 rgba(0,0,0,.4);
  }

  /* ============ Audience mode: full background, centered ============ */
  html.mode-audience #bg { display: block; }
  html.mode-audience #stage { justify-content: center; align-items: center; }
  html.mode-audience #scrim { background: rgba(0,0,0,var(--scrim)); }
  html.mode-audience .lyrics.shadow, html.mode-audience #composed.shadow .cline {
    text-shadow: 0 2px 10px rgba(0,0,0,.55), 0 1px 2px rgba(0,0,0,.6);
  }

  /* ---- video-player-style fullscreen button (audience only, when supported) ---- */
  .fsbtn {
    position: fixed; right: max(16px, env(safe-area-inset-right)); bottom: max(16px, env(safe-area-inset-bottom));
    z-index: 50; width: 52px; height: 52px; border: 0; border-radius: 12px;
    background: rgba(0,0,0,.42); color: #fff; font-size: 24px; line-height: 1;
    cursor: pointer; display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(4px); transition: opacity .3s ease, background .15s ease;
  }
  .fsbtn:hover { background: rgba(0,0,0,.66); }
  html.mode-audience .fsbtn.avail { display: flex; }
  .fsbtn.idle { opacity: 0; }
</style>
</head>
<body>
  <div class="frame" id="frame">
    <div id="bg"></div>
    <img id="bgimg" alt="" draggable="false" />
    <video id="bgvideo" muted autoplay loop playsinline></video>
    <div id="scrim"></div>
    <div id="stage">
      <div id="composed"></div>
      <div class="lyrics" id="lyrics"></div>
      <div class="caption" id="caption"></div>
    </div>
  </div>
  <button id="fs" class="fsbtn" title="Fullscreen (rotate for a bigger view)" aria-label="Toggle fullscreen"></button>
<script>
  var ICON_EXPAND = '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>';
  var ICON_COMPRESS = '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3v6H3M21 15h-6v6M15 9l6-6M3 21l6-6"/></svg>';
(function () {
  var q = new URLSearchParams(location.search);
  var m = location.pathname.match(/\/broadcast\/([^/]+)\/view/);
  var room = q.get('room') || (m && m[1]) || 'main';
  var base = (q.get('base') || (location.protocol.indexOf('http') === 0 ? location.origin : '')).replace(/\/$/, '');
  var token = q.get('token') || '';
  var mode = q.get('mode') === 'audience' ? 'audience' : 'obs';   // OBS is the default
  var pos = q.get('pos') || 'bottom';
  var DEFAULT_BG = 'radial-gradient(circle at 50% 28%, #3a2b6b 0%, #1c1440 55%, #0a0720 100%)';

  var root = document.documentElement;
  root.classList.add('mode-' + mode, 'pos-' + pos);
  if (q.get('clean') === '1') root.classList.add('clean');
  if (mode === 'obs' && q.get('size')) root.style.setProperty('--size', q.get('size') + 'cqh');

  var stage = document.getElementById('stage');
  var bgEl = document.getElementById('bg');
  var bgImg = document.getElementById('bgimg');
  var bgVideo = document.getElementById('bgvideo');
  var composedEl = document.getElementById('composed');
  var lyricsEl = document.getElementById('lyrics');
  var captionEl = document.getElementById('caption');

  // ---- fullscreen (video-player style), audience only ----
  var fsBtn = document.getElementById('fs');
  var reqFs = root.requestFullscreen || root.webkitRequestFullscreen;
  var exitFs = document.exitFullscreen || document.webkitExitFullscreen;
  function inFs() { return document.fullscreenElement || document.webkitFullscreenElement; }
  if (mode === 'audience' && reqFs) {
    fsBtn.classList.add('avail');
    fsBtn.innerHTML = ICON_EXPAND;
    fsBtn.addEventListener('click', function () {
      if (!inFs()) {
        var p = reqFs.call(root);
        if (p && p.then) p.then(lockLandscape).catch(function () {});
        else lockLandscape();
      } else if (exitFs) {
        exitFs.call(document);
      }
    });
    document.addEventListener('fullscreenchange', function () { fsBtn.innerHTML = inFs() ? ICON_COMPRESS : ICON_EXPAND; });
    // auto-hide the button after a moment; reveal on tap/move (like a player)
    var idle;
    function poke() {
      fsBtn.classList.remove('idle');
      clearTimeout(idle);
      idle = setTimeout(function () { fsBtn.classList.add('idle'); }, 2600);
    }
    ['pointermove', 'pointerdown', 'touchstart', 'keydown'].forEach(function (ev) {
      window.addEventListener(ev, poke, { passive: true });
    });
    poke();
  }
  function lockLandscape() {
    try {
      if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(function () {});
    } catch (_) {}
  }

  function textOf(slide) {
    if (!slide) return [];
    if (slide.composed && slide.composed.length) return slide.composed.map(function (l) { return l.text; });
    return slide.lines || [];
  }

  // ---- countdown / clock (rendered locally so the web view isn't blank while a
  //      timer is live, matching the audience/stage output) ----
  function pad2(n) { return n < 10 ? '0' + n : '' + n; }
  function fmtCountdown(toMs) {
    var ms = Math.max(0, (toMs || 0) - Date.now());
    var total = Math.round(ms / 1000);
    var h = Math.floor(total / 3600), m = Math.floor((total % 3600) / 60), s = total % 60;
    return h > 0 ? (h + ':' + pad2(m) + ':' + pad2(s)) : (m + ':' + pad2(s));
  }
  function fmtClock() {
    var d = new Date(), h = d.getHours(), m = d.getMinutes();
    var ap = h >= 12 ? 'PM' : 'AM', h12 = h % 12; if (h12 === 0) h12 = 12;
    return h12 + ':' + pad2(m) + ' ' + ap;
  }
  function isTimer(slide) { return slide && (slide.kind === 'countdown' || slide.kind === 'clock'); }
  function renderTimer(slide, scale) {
    composedEl.style.display = 'none';
    lyricsEl.style.display = '';
    lyricsEl.innerHTML = '';
    var span = document.createElement('span');
    span.className = 'line';
    span.textContent = slide.kind === 'clock' ? fmtClock() : fmtCountdown(slide.countdownTo);
    lyricsEl.appendChild(span);
    if (mode === 'audience') lyricsEl.style.fontSize = sizeFor(1, (scale || 1) * 1.6);
    var cap = slide.message || '';
    captionEl.textContent = cap;
    captionEl.style.display = cap ? '' : 'none';
    stage.classList.add('show');
  }

  var liveSlide = null, liveScale = 1, tick = null;
  function startTick() { if (!tick) tick = setInterval(function () { if (isTimer(liveSlide)) renderTimer(liveSlide, liveScale); }, 500); }
  function stopTick() { if (tick) { clearInterval(tick); tick = null; } }

  function applyBackground(bg) {
    bgImg.style.display = 'none'; bgVideo.style.display = 'none';
    if (!bg) { bgEl.style.background = DEFAULT_BG; return; }
    if (bg.type === 'color' || bg.type === 'gradient') { bgEl.style.background = bg.value; return; }
    if (bg.type === 'image' && /^https?:/i.test(bg.value)) { bgImg.src = bg.value; bgImg.style.display = 'block'; bgEl.style.background = '#000'; return; }
    if (bg.type === 'video' && /^https?:/i.test(bg.value)) { if (bgVideo.src !== bg.value) bgVideo.src = bg.value; bgVideo.style.display = 'block'; bgEl.style.background = '#000'; return; }
    bgEl.style.background = DEFAULT_BG; // local media we can't reach from the web
  }

  function applyTheme(t) {
    if (!t) return;
    root.style.setProperty('--text', t.textColor || '#fff');
    root.style.setProperty('--accent', t.captionColor || '#ffd27f');
    root.style.setProperty('--scrim', String(t.scrim != null ? t.scrim : 0));
    lyricsEl.style.textAlign = t.textAlign || 'center';
    lyricsEl.classList.toggle('upper', !!t.uppercase);
    lyricsEl.classList.toggle('shadow', t.shadow !== false);
    composedEl.classList.toggle('shadow', t.shadow !== false);
  }

  function sizeFor(n, scale) {
    var s = n <= 1 ? 9 : n <= 2 ? 8 : n <= 3 ? 6.5 : n <= 4 ? 5.5 : n <= 6 ? 4.5 : 3.8;
    return (s * (scale || 1)) + 'cqh';
  }

  function renderComposed(lines) {
    composedEl.innerHTML = '';
    lines.forEach(function (l) {
      var d = document.createElement('div');
      d.className = 'cline';
      d.textContent = l.text;
      d.style.left = (l.x / 960 * 100) + '%';
      d.style.top = (l.y / 540 * 100) + '%';
      d.style.fontSize = (l.fontSize / 540 * 100) + 'cqh';
      d.style.color = l.color || 'var(--text)';
      d.style.textAlign = l.align || 'center';
      composedEl.appendChild(d);
    });
    composedEl.style.display = 'block';
    lyricsEl.style.display = 'none';
  }

  function renderLines(lines, scale) {
    composedEl.style.display = 'none';
    lyricsEl.style.display = '';
    lyricsEl.innerHTML = '';
    lines.forEach(function (t) {
      var d = document.createElement('span'); d.className = 'line'; d.textContent = t; lyricsEl.appendChild(d);
    });
    if (mode === 'audience') lyricsEl.style.fontSize = sizeFor(lines.length, scale);
  }

  function render(state) {
    var slide = state && state.slide;
    var theme = state && state.theme;
    var scale = (theme && theme.fontScale) || 1;
    liveSlide = slide; liveScale = scale;

    if (mode === 'audience') {
      applyTheme(theme);
      if (state && state.blackout) { bgEl.style.background = '#000'; bgImg.style.display = 'none'; bgVideo.style.display = 'none'; stage.classList.remove('show'); stopTick(); return; }
      applyBackground(slide && slide.background ? slide.background : (state && state.background));
    }

    // Hide when the operator shows the logo too, matching the native output
    // (otherwise a ticking countdown would stay on air over the logo).
    var hidden = !state || state.blackout || state.clearText || state.showLogo || !slide;
    if (hidden) { stage.classList.remove('show'); stopTick(); return; }

    // Countdown / clock: render a live-ticking timer (else the web view is blank
    // whenever a countdown is on air, unlike the local audience output).
    if (isTimer(slide)) { renderTimer(slide, scale); startTick(); return; }
    stopTick();

    if (mode === 'audience' && slide.composed && slide.composed.length) {
      renderComposed(slide.composed);
    } else {
      var lines = textOf(slide).filter(function (t) { return t && t.trim(); });
      if (!lines.length) { stage.classList.remove('show'); return; }
      renderLines(lines, scale);
    }

    var composedShown = mode === 'audience' && slide.composed && slide.composed.length;
    var cap = slide.caption || '';
    captionEl.textContent = cap;
    captionEl.style.display = cap && !composedShown ? '' : 'none';
    stage.classList.add('show');
  }

  function apply(msg) { if (msg && typeof msg === 'object' && 'state' in msg) render(msg.state); }

  // Primary: Server-Sent Events (instant). Fallback: short-poll.
  // The relay projects the payload per channel: the audience page asks for the
  // User slice, the OBS page for the Stream slice, so an item that's off-air for
  // one channel never even reaches that channel's page.
  var viewChan = mode === 'audience' ? 'users' : 'stream';
  var params = [];
  if (token) params.push('token=' + encodeURIComponent(token));
  params.push('view=' + viewChan);
  var qs = '?' + params.join('&');
  var pollTimer = null, lastRev = -1, es = null;

  function startPolling() {
    if (pollTimer) return;
    pollTimer = setInterval(function () {
      fetch(base + '/broadcast/' + encodeURIComponent(room) + '/state' + qs, { cache: 'no-store' })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (d) { if (d && d.rev !== lastRev) { lastRev = d.rev; render(d.state); } })
        .catch(function () {});
    }, 700);
  }
  function startSSE() {
    try {
      es = new EventSource(base + '/broadcast/' + encodeURIComponent(room) + '/stream' + qs);
      es.addEventListener('state', function (e) { try { apply(JSON.parse(e.data)); } catch (_) {} });
      es.onerror = function () { startPolling(); };
    } catch (_) { startPolling(); }
  }

  if (window.EventSource) startSSE(); else startPolling();
})();
</script>
</body>
</html>
